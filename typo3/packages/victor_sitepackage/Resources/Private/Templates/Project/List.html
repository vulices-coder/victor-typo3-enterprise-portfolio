<section class="section-card">
    <p class="eyebrow">Extbase Modul Demo</p>

    <h2>Dynamische Projekte aus TYPO3</h2>

    <div class="project-grid">
        <f:for each="{projects}" as="project">
            <article>
                <h3>{project.title}</h3>

                <p>{project.description}</p>

                <p>
                    <strong>Stack:</strong>
                    {project.techStack}
                </p>

                <f:if condition="{project.githubUrl}">
                    <p>
                        <a href="{project.githubUrl}" target="_blank" rel="noopener">
                            GitHub ansehen
                        </a>
                    </p>
                </f:if>

                <f:if condition="{project.demoUrl}">
                    <p>
                        <a href="{project.demoUrl}" target="_blank" rel="noopener">
                            Demo öffnen
                        </a>
                    </p>
                </f:if>
            </article>
        </f:for>
    </div>
</section>
