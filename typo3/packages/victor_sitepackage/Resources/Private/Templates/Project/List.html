<section class="section-card project-showcase-section">

    <p class="eyebrow">
        Extbase Module Demo
    </p>

    <h2>
        Dynamische Projekte aus TYPO3
    </h2>

    <div class="project-showcase-grid">

        <f:for each="{projects}" as="project">

            <article class="project-card-enterprise">

                <div>
                    <h3>
                        {project.title}
                    </h3>

                    <p class="project-description">
                        {project.description}
                    </p>
                </div>

                <div class="project-footer">

                    <span class="stack-tag">
                        {project.techStack}
                    </span>

                    <div class="project-links">

                        <f:if condition="{project.githubUrl}">
                            <a
                                href="{project.githubUrl}"
                                target="_blank"
                                rel="noopener"
                            >
                                GitHub
                            </a>
                        </f:if>

                        <f:if condition="{project.demoUrl}">
                            <a
                                href="{project.demoUrl}"
                                target="_blank"
                                rel="noopener"
                            >
                                Demo
                            </a>
                        </f:if>

                    </div>

                </div>

            </article>

        </f:for>

    </div>

</section>
